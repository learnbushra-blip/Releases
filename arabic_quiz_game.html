<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبر معلوماتك</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'IBM Plex Sans Arabic',sans-serif;
  background:linear-gradient(135deg,#1a1040 0%,#0f2044 50%,#1a1040 100%);
  min-height:100vh;direction:rtl;padding:2rem 1rem;
  display:flex;align-items:flex-start;justify-content:center;
}
body::before{content:'';position:fixed;top:-200px;right:-200px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(108,99,255,0.15),transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-200px;left:-200px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(255,101,132,0.12),transparent 70%);pointer-events:none;z-index:0}
.qz{width:100%;max-width:580px;position:relative;z-index:1}
.qz-screen{display:none}.qz-screen.active{display:block}

/* HOME */
.home-hero{text-align:center;padding:1.5rem 0 1rem}
.home-emoji{font-size:52px;display:block;margin-bottom:10px;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.home-title{font-size:30px;font-weight:700;color:#fff;margin-bottom:4px}
.home-sub{font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:1.5rem}
.sec-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:2px;margin-bottom:8px}

.cats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
@media(max-width:500px){.cats-grid{grid-template-columns:repeat(2,1fr)}}
.cat-card{border-radius:14px;padding:0.9rem 0.5rem;cursor:pointer;transition:all 0.25s;text-align:center;border:2px solid transparent;position:relative;overflow:hidden}
.cat-card:hover{transform:translateY(-3px)}
.cat-card.selected{border-color:rgba(255,255,255,0.7);transform:scale(1.04)}
.cat-card[data-cat="تقنية"]{background:linear-gradient(135deg,#667eea,#764ba2)}
.cat-card[data-cat="علوم"]{background:linear-gradient(135deg,#11998e,#38ef7d)}
.cat-card[data-cat="تاريخ"]{background:linear-gradient(135deg,#f7971e,#ffd200)}
.cat-card[data-cat="رياضة"]{background:linear-gradient(135deg,#f953c6,#b91d73)}
.cat-card[data-cat="دول وعواصم"]{background:linear-gradient(135deg,#43b89c,#0f6e56)}
.cat-card[data-cat="رياضيات"]{background:linear-gradient(135deg,#e96c5a,#c0392b)}
.cat-card[data-cat="إنجليزي"]{background:linear-gradient(135deg,#4facfe,#00f2fe)}
.cat-card[data-cat="ثقافة عامة"]{background:linear-gradient(135deg,#fa709a,#fee140)}
.cat-check{position:absolute;top:6px;left:6px;width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.9);display:none;align-items:center;justify-content:center;font-size:11px;color:#333}
.cat-card.selected .cat-check{display:flex}
.cat-icon{font-size:26px;display:block;margin-bottom:5px}
.cat-name{font-size:11px;font-weight:700;color:#fff;line-height:1.3}
.cat-count{font-size:10px;color:rgba(255,255,255,0.55);margin-top:2px}

.lvl-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
.lvl-btn{padding:9px 4px;border-radius:12px;border:2px solid transparent;background:rgba(255,255,255,0.07);font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.2s;font-family:inherit;text-align:center;line-height:1.4}
.lvl-btn:hover{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.8)}
.lvl-btn.easy.selected{background:rgba(67,198,172,0.2);border-color:#43c6ac;color:#43c6ac}
.lvl-btn.medium.selected{background:rgba(247,151,30,0.2);border-color:#f7971e;color:#f7971e}
.lvl-btn.hard.selected{background:rgba(255,101,132,0.2);border-color:#ff6584;color:#ff6584}
.lvl-btn.mixed.selected{background:rgba(108,99,255,0.2);border-color:#6c63ff;color:#a78bfa}

.start-btn{width:100%;padding:15px;border-radius:14px;border:none;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:all 0.3s}
.start-btn:not(:disabled){background:linear-gradient(135deg,#6c63ff,#a855f7);color:#fff;box-shadow:0 8px 24px rgba(108,99,255,0.4)}
.start-btn:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(108,99,255,0.55)}
.start-btn:disabled{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.2);cursor:not-allowed}

/* GAME */
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.lvl-badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px}
.lvl-badge.easy{background:rgba(67,198,172,0.2);color:#43c6ac;border:1px solid rgba(67,198,172,0.3)}
.lvl-badge.medium{background:rgba(247,151,30,0.2);color:#f7971e;border:1px solid rgba(247,151,30,0.3)}
.lvl-badge.hard{background:rgba(255,101,132,0.2);color:#ff6584;border:1px solid rgba(255,101,132,0.3)}
.lvl-badge.mixed{background:rgba(108,99,255,0.2);color:#a78bfa;border:1px solid rgba(108,99,255,0.3)}
.prog-wrap{flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;min-width:80px}
.prog-fill{height:100%;border-radius:3px;transition:width 0.4s ease;background:linear-gradient(90deg,#6c63ff,#f953c6)}
.qnum{font-size:12px;color:rgba(255,255,255,0.35);min-width:36px;text-align:left}
.timer-box{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;border:2px solid rgba(255,255,255,0.12);color:#fff;flex-shrink:0;transition:all 0.3s}
.timer-box.warn{border-color:#ff6584;color:#ff6584;animation:blink .5s ease infinite alternate}
@keyframes blink{from{opacity:1}to{opacity:0.4}}
.score-pill{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.1)}
.cat-pill{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.08)}

.q-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:1.5rem;margin-bottom:1rem;min-height:90px;display:flex;align-items:center}
.q-card.pop{animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.q-text{font-size:17px;font-weight:500;color:#fff;line-height:1.65}

.opts{display:flex;flex-direction:column;gap:9px;margin-bottom:1rem}
.opt{padding:12px 16px;border-radius:14px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.8);font-size:14px;font-family:inherit;cursor:pointer;transition:all 0.2s;text-align:right;display:flex;align-items:center;gap:12px;width:100%;font-weight:500}
.opt:hover:not(:disabled){background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.22);transform:translateX(-3px)}
.opt:disabled{cursor:default}
.opt.correct{background:rgba(34,197,94,0.18);border-color:#22c55e;color:#86efac;animation:popIn .3s ease}
.opt.wrong{background:rgba(239,68,68,0.18);border-color:#ef4444;color:#fca5a5;animation:shakeIt .4s ease}
.opt.reveal{background:rgba(59,130,246,0.18);border-color:#3b82f6;color:#93c5fd}
@keyframes popIn{0%{transform:scale(.97)}60%{transform:scale(1.02)}100%{transform:scale(1)}}
@keyframes shakeIt{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.opt-letter{width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.04);transition:all 0.2s}
.opt.correct .opt-letter{background:#22c55e;border-color:#22c55e;color:#fff}
.opt.wrong .opt-letter{background:#ef4444;border-color:#ef4444;color:#fff}
.opt.reveal .opt-letter{background:#3b82f6;border-color:#3b82f6;color:#fff}

.explain-box{border-radius:14px;padding:12px 16px;font-size:13px;line-height:1.7;margin-bottom:1rem;display:none;background:rgba(108,99,255,0.15);border:1px solid rgba(108,99,255,0.3);color:rgba(255,255,255,0.75)}
.explain-box.show{display:block;animation:slideIn .3s ease}
.explain-box b{color:#a78bfa}

.next-btn{width:100%;padding:14px;border-radius:14px;border:none;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .25s;display:none;background:linear-gradient(135deg,#6c63ff,#a855f7);color:#fff;box-shadow:0 6px 20px rgba(108,99,255,0.35)}
.next-btn.show{display:block;animation:slideIn .25s ease}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(108,99,255,0.5)}

/* RESULT */
.result-top{text-align:center;padding:1.25rem 0 1rem}
.result-ring{width:130px;height:130px;border-radius:50%;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;position:relative;background:conic-gradient(var(--rc,#6c63ff) var(--rp,0%),rgba(255,255,255,0.06) 0)}
.result-inner{width:106px;height:106px;border-radius:50%;background:#1a1040;display:flex;flex-direction:column;align-items:center;justify-content:center}
.result-pct{font-size:28px;font-weight:700;color:#fff}
.result-pct-l{font-size:11px;color:rgba(255,255,255,0.35)}
.result-emoji{font-size:40px;display:block;margin-bottom:6px;animation:bounce 1s ease 3}
.result-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:5px}
.result-sub{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:1.25rem}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.rs{border-radius:14px;padding:12px;text-align:center}
.rs.c{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.2)}
.rs.w{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.2)}
.rs.s{background:rgba(108,99,255,0.12);border:1px solid rgba(108,99,255,0.2)}
.rs-n{font-size:24px;font-weight:700;color:#fff}
.rs-l{font-size:11px;margin-top:2px}
.rs.c .rs-l{color:#86efac}.rs.w .rs-l{color:#fca5a5}.rs.s .rs-l{color:#a78bfa}
.review-box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:1rem;margin-bottom:1.25rem}
.review-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:1.5px;margin-bottom:8px}
.rev-item{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.rev-item:last-child{border-bottom:none}
.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.rev-dot.c{background:#22c55e}.rev-dot.w{background:#ef4444}
.rev-q{font-size:12px;color:rgba(255,255,255,0.6);line-height:1.5}
.rev-a{font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px}
.rev-a .ok{color:#86efac}.rev-a .bad{color:#fca5a5}
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.replay-btn{padding:13px;border-radius:14px;border:1.5px solid rgba(255,255,255,0.12);background:transparent;font-family:inherit;font-size:14px;font-weight:700;color:rgba(255,255,255,0.6);cursor:pointer;transition:all .2s}
.replay-btn:hover{background:rgba(255,255,255,0.07);color:#fff}
.home-btn{padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,#f953c6,#b91d73);font-family:inherit;font-size:14px;font-weight:700;color:#fff;cursor:pointer;transition:all .2s;box-shadow:0 6px 20px rgba(249,83,198,0.3)}
.home-btn:hover{transform:translateY(-2px)}
@media(max-width:480px){body{padding:1rem .75rem}.lvl-row{grid-template-columns:repeat(2,1fr)}.q-text{font-size:15px}.opt{font-size:13px}}
</style>
</head>
<body>
<div class="qz">

  <!-- HOME -->
  <div class="qz-screen active" id="screenHome">
    <div class="home-hero">
      <span class="home-emoji">🧠</span>
      <div class="home-title">اختبر معلوماتك!</div>
      <div class="home-sub">8 فئات · 3 مستويات · 120+ سؤال</div>
    </div>
    <div class="sec-lbl">اختر الفئة</div>
    <div class="cats-grid" id="catGrid"></div>
    <div class="sec-lbl">اختر المستوى</div>
    <div class="lvl-row">
      <button class="lvl-btn easy selected" data-lvl="easy">🟢<br>سهل</button>
      <button class="lvl-btn medium" data-lvl="medium">🟡<br>متوسط</button>
      <button class="lvl-btn hard" data-lvl="hard">🔴<br>صعب</button>
      <button class="lvl-btn mixed" data-lvl="mixed">🎲<br>مختلط</button>
    </div>
    <button class="start-btn" id="startBtn" disabled>اختر فئة أولاً</button>
  </div>

  <!-- GAME -->
  <div class="qz-screen" id="screenGame">
    <div class="topbar">
      <span class="lvl-badge" id="lvlBadge">سهل</span>
      <span class="cat-pill" id="catPill"></span>
      <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      <span class="qnum" id="qNum">1/10</span>
      <div class="timer-box" id="timerBox">20</div>
      <span class="score-pill" id="scorePill">0 نقطة</span>
    </div>
    <div class="q-card pop" id="qCard"><div class="q-text" id="qText"></div></div>
    <div class="opts" id="optsWrap"></div>
    <div class="explain-box" id="explainBox"></div>
    <button class="next-btn" id="nextBtn">التالي ←</button>
  </div>

  <!-- RESULT -->
  <div class="qz-screen" id="screenResult">
    <div class="result-top">
      <div class="result-ring" id="resultRing"><div class="result-inner"><div class="result-pct" id="resPct">0%</div><div class="result-pct-l">نتيجتك</div></div></div>
      <span class="result-emoji" id="resEmoji">🏆</span>
      <div class="result-title" id="resTitle"></div>
      <div class="result-sub" id="resSub"></div>
    </div>
    <div class="result-stats">
      <div class="rs c"><div class="rs-n" id="rsC">0</div><div class="rs-l">✅ صح</div></div>
      <div class="rs w"><div class="rs-n" id="rsW">0</div><div class="rs-l">❌ خطأ</div></div>
      <div class="rs s"><div class="rs-n" id="rsS">0</div><div class="rs-l">🏆 نقطة</div></div>
    </div>
    <div class="review-box"><div class="review-lbl">مراجعة الأسئلة</div><div id="reviewList"></div></div>
    <div class="action-row">
      <button class="replay-btn" id="replayBtn">🔄 مجدداً</button>
      <button class="home-btn" id="homeBtn">🏠 القائمة</button>
    </div>
  </div>
</div>

<script>
const DB = {

  'دول وعواصم': { icon:'🌍', grad:'linear-gradient(135deg,#43b89c,#0f6e56)', easy:[
    {q:'ما عاصمة فرنسا؟', opts:['لندن','برلين','باريس','مدريد'], a:2, exp:'باريس هي عاصمة فرنسا ومدينتها الأكبر.'},
    {q:'ما عاصمة اليابان؟', opts:['أوساكا','طوكيو','كيوتو','ناغوي'], a:1, exp:'طوكيو عاصمة اليابان وأكبر مدنها.'},
    {q:'ما عاصمة الأردن؟', opts:['إربد','الزرقاء','عقبة','عمان'], a:3, exp:'عمان عاصمة المملكة الأردنية الهاشمية.'},
    {q:'ما عاصمة البرازيل؟', opts:['ريو دي جانيرو','ساو باولو','برازيليا','سلفادور'], a:2, exp:'برازيليا هي عاصمة البرازيل وليس ريو دي جانيرو!'},
    {q:'ما أكبر دولة مساحةً في العالم؟', opts:['الصين','الولايات المتحدة','كندا','روسيا'], a:3, exp:'روسيا أكبر دولة في العالم بمساحة تتجاوز 17 مليون كم².'},
    {q:'ما عاصمة أستراليا؟', opts:['سيدني','ملبورن','كانبيرا','بريسبان'], a:2, exp:'كانبيرا عاصمة أستراليا، لا سيدني التي يظنها كثيرون.'},
    {q:'ما عاصمة مصر؟', opts:['الإسكندرية','الجيزة','القاهرة','أسوان'], a:2, exp:'القاهرة عاصمة مصر وأكبر مدنها.'},
    {q:'في أي قارة تقع نيجيريا؟', opts:['آسيا','أوروبا','أمريكا','أفريقيا'], a:3, exp:'نيجيريا أكبر دول أفريقيا سكاناً وتقع في غربها.'},
  ], medium:[
    {q:'ما عاصمة كندا؟', opts:['تورنتو','مونتريال','فانكوفر','أوتاوا'], a:3, exp:'أوتاوا هي عاصمة كندا وليس تورنتو الأكبر سكاناً.'},
    {q:'ما عاصمة الأرجنتين؟', opts:['ريو','مونتيفيديو','بيونس آيرس','سانتياغو'], a:2, exp:'بيونس آيرس عاصمة الأرجنتين وأكبر مدنها.'},
    {q:'ما عاصمة النمسا؟', opts:['زيورخ','فيينا','برن','براغ'], a:1, exp:'فيينا عاصمة النمسا، مشهورة بالموسيقى الكلاسيكية.'},
    {q:'كم عدد دول العالم تقريباً؟', opts:['150','175','193','210'], a:2, exp:'193 دولة أعضاء في الأمم المتحدة حتى الآن.'},
    {q:'ما أصغر دولة في العالم؟', opts:['موناكو','سان مارينو','الفاتيكان','ليختنشتاين'], a:2, exp:'الفاتيكان أصغر دولة في العالم بمساحة 0.44 كم².'},
    {q:'ما عاصمة تركيا؟', opts:['إسطنبول','أنقرة','إزمير','بورصة'], a:1, exp:'أنقرة عاصمة تركيا وليس إسطنبول الأكثر شهرة.'},
    {q:'ما عاصمة جنوب أفريقيا الإدارية؟', opts:['كيب تاون','جوهانسبرغ','بريتوريا','ديربان'], a:2, exp:'بريتوريا هي العاصمة الإدارية لجنوب أفريقيا.'},
    {q:'في أي قارة تقع المكسيك؟', opts:['أمريكا الجنوبية','أمريكا الشمالية','أمريكا الوسطى','كاريبي'], a:1, exp:'المكسيك تقع في أمريكا الشمالية وإن كانت جزءاً من أمريكا اللاتينية ثقافياً.'},
  ], hard:[
    {q:'ما عاصمة كازاخستان الجديدة؟', opts:['ألماتي','أستانا','أكتوبي','شيمكنت'], a:1, exp:'أستانا (سابقاً نور سلطان) هي عاصمة كازاخستان.'},
    {q:'ما عاصمة ميانمار؟', opts:['يانغون','مانداليه','نيبيداو','باغو'], a:2, exp:'نيبيداو أصبحت عاصمة ميانمار عام 2006 خلفاً ليانغون.'},
    {q:'ما أطول نهر في العالم؟', opts:['الأمازون','المسيسيبي','النيل','اليانغتسي'], a:2, exp:'النيل أطول نهر في العالم بطول يتجاوز 6650 كم.'},

  ]},

const LVLS={easy:{l:'سهل',c:'easy',t:20,p:10},medium:{l:'متوسط',c:'medium',t:15,p:20},hard:{l:'صعب',c:'hard',t:10,p:30},mixed:{l:'مختلط',c:'mixed',t:15,p:15}};
const AR=['أ','ب','ج','د'];
let selCat=null,selLvl='easy',Qs=[],qi=0,score=0,corr=0,wrng=0,tval=0,tint=null,done=false,ans=[];

function buildCats(){
  const g=document.getElementById('catGrid');g.innerHTML='';
  Object.keys(DB).forEach(cat=>{
    const d=DB[cat],card=document.createElement('div');
    card.className='cat-card';card.dataset.cat=cat;card.style.background=d.grad;
    const total=d.easy.length+d.medium.length+d.hard.length;
    card.innerHTML=`<div class="cat-check">✓</div><span class="cat-icon">${d.icon}</span><div class="cat-name">${cat}</div><div class="cat-count">${total} سؤال</div>`;
    card.addEventListener('click',()=>{
      document.querySelectorAll('.cat-card').forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected');selCat=cat;
      const sb=document.getElementById('startBtn');sb.disabled=false;sb.textContent='ابدأ التحدي ←';
    });
    g.appendChild(card);
  });
}

document.querySelectorAll('.lvl-btn').forEach(b=>b.addEventListener('click',function(){
  document.querySelectorAll('.lvl-btn').forEach(x=>x.classList.remove('selected'));
  this.classList.add('selected');selLvl=this.dataset.lvl;
}));

function show(s){document.querySelectorAll('.qz-screen').forEach(e=>e.classList.remove('active'));document.getElementById('screen'+s).classList.add('active');}

function getQs(){
  const c=DB[selCat];
  let p=selLvl==='mixed'?[...c.easy,...c.medium,...c.hard]:[...c[selLvl]];
  return p.sort(()=>Math.random()-0.5).slice(0,Math.min(10,p.length));
}

function start(){Qs=getQs();qi=0;score=0;corr=0;wrng=0;ans=[];show('Game');renderQ();}

function renderQ(){
  clearInterval(tint);done=false;
  const q=Qs[qi],lv=LVLS[selLvl];
  document.getElementById('progFill').style.width=Math.round(qi/Qs.length*100)+'%';
  document.getElementById('qNum').textContent=(qi+1)+'/'+Qs.length;
  document.getElementById('lvlBadge').textContent=lv.l;
  document.getElementById('lvlBadge').className='lvl-badge '+lv.c;
  document.getElementById('catPill').textContent=selCat;
  document.getElementById('scorePill').textContent=score+' نقطة';
  const qc=document.getElementById('qCard');qc.classList.remove('pop');void qc.offsetWidth;qc.classList.add('pop');
  document.getElementById('qText').textContent=q.q;
  document.getElementById('explainBox').className='explain-box';
  document.getElementById('nextBtn').className='next-btn';
  const ow=document.getElementById('optsWrap');ow.innerHTML='';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML=`<div class="opt-letter">${AR[i]}</div><span>${o}</span>`;
    b.addEventListener('click',()=>pick(i));ow.appendChild(b);
  });
  tval=lv.t;
  const tb=document.getElementById('timerBox');tb.textContent=tval;tb.className='timer-box';
  tint=setInterval(()=>{
    tval--;tb.textContent=tval;
    if(tval<=5)tb.className='timer-box warn';
    if(tval<=0){clearInterval(tint);timeUp();}
  },1000);
}

function pick(i){
  if(done)return;done=true;clearInterval(tint);
  const q=Qs[qi],ok=i===q.a;
  if(ok){score+=LVLS[selLvl].p;corr++;}else wrng++;
  ans.push({q:q.q,ok,mine:q.opts[i],right:q.opts[q.a]});
  document.querySelectorAll('.opt').forEach((b,j)=>{
    b.disabled=true;
    if(j===q.a)b.className='opt '+(i===q.a?'correct':'reveal');
    if(j===i&&!ok)b.className='opt wrong';
  });
  const eb=document.getElementById('explainBox');
  eb.innerHTML=`<b>${ok?'✅ صحيح!':'❌ خطأ!'}</b> ${q.exp}`;
  eb.className='explain-box show';
  document.getElementById('scorePill').textContent=score+' نقطة';
  const nb=document.getElementById('nextBtn');nb.className='next-btn show';
  nb.textContent=qi===Qs.length-1?'النتائج 🏆':'التالي ←';
}

function timeUp(){
  if(done)return;done=true;wrng++;
  const q=Qs[qi];
  ans.push({q:q.q,ok:false,mine:'⏰ انتهى الوقت',right:q.opts[q.a]});
  document.querySelectorAll('.opt').forEach((b,j)=>{b.disabled=true;if(j===q.a)b.className='opt reveal';});
  const eb=document.getElementById('explainBox');
  eb.innerHTML=`<b>⏰ انتهى الوقت!</b> ${q.exp}`;eb.className='explain-box show';
  const nb=document.getElementById('nextBtn');nb.className='next-btn show';
  nb.textContent=qi===Qs.length-1?'النتائج 🏆':'التالي ←';
}

function nextQ(){qi++;if(qi>=Qs.length)showResult();else renderQ();}

function showResult(){
  clearInterval(tint);
  const pct=Math.round(corr/Qs.length*100);
  document.getElementById('resPct').textContent=pct+'%';
  document.getElementById('rsC').textContent=corr;
  document.getElementById('rsW').textContent=wrng;
  document.getElementById('rsS').textContent=score;
  let em,ti,su,col;
  if(pct>=80){em='🏆';ti='ممتاز!';su='أداء استثنائي، أنت خبير حقيقي!';col='#22c55e';}
  else if(pct>=60){em='👍';ti='جيد جداً!';su='نتيجة رائعة، يمكنك التحسين أكثر.';col='#f7971e';}
  else if(pct>=40){em='📚';ti='مقبول';su='تحتاج لمزيد من الدراسة والتدريب.';col='#6c63ff';}
  else{em='💪';ti='حاول مجدداً!';su='كل محاولة تعلمك شيئاً جديداً!';col='#ff6584';}
  document.getElementById('resEmoji').textContent=em;
  document.getElementById('resTitle').textContent=ti;
  document.getElementById('resSub').textContent=su;
  const ring=document.getElementById('resultRing');
  ring.style.setProperty('--rc',col);ring.style.setProperty('--rp',pct+'%');
  const list=document.getElementById('reviewList');list.innerHTML='';
  ans.forEach(a=>{
    const d=document.createElement('div');d.className='rev-item';
    d.innerHTML=`<div class="rev-dot ${a.ok?'c':'w'}"></div><div><div class="rev-q">${a.q}</div><div class="rev-a">إجابتك: <span class="${a.ok?'ok':'bad'}">${a.mine}</span>${!a.ok?' ← الصح: <span class="ok">'+a.right+'</span>':''}</div></div>`;
    list.appendChild(d);
  });
  show('Result');
}

document.getElementById('startBtn').addEventListener('click',start);
document.getElementById('nextBtn').addEventListener('click',nextQ);
document.getElementById('replayBtn').addEventListener('click',start);
document.getElementById('homeBtn').addEventListener('click',()=>show('Home'));
buildCats();
</script>
</body>
</html>
